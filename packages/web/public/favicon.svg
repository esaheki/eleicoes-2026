<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0f172a"/>

  <!-- Bar chart — three bars in Brazilian flag colours -->
  <!-- Green (#009C3B) — left, short -->
  <rect x="4" y="20" width="7" height="8" rx="1.5" fill="#22c55e"/>
  <!-- Yellow (#FFDF00) — centre, tallest -->
  <rect x="12.5" y="10" width="7" height="18" rx="1.5" fill="#facc15"/>
  <!-- Blue (#002776) — right, mid -->
  <rect x="21" y="15" width="7" height="13" rx="1.5" fill="#60a5fa"/>

  <!-- Upward-trend line connecting bar tops -->
  <polyline
    points="7.5,20 16,10 24.5,15"
    fill="none"
    stroke="rgba(255,255,255,0.35)"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
